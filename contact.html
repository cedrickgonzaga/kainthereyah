<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KainThereYah - Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="images/Kain.png" alt="" width="50" height="50" class="d-inline-block">
                <span>KainThereYah!</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-lg-3 mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html"><i class="bi bi-house-fill"></i>
                            Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="menu.html"><i class="bi bi-calculator"></i>
                            Menu Prices </a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contact.html"><i
                                class="bi bi-person-lines-fill"></i> Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="contact-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-sm border-0 p-4">
                        <h2 class="text-center mb-4 text-accent">Send us a message</h2>
                        <form onsubmit="event.preventDefault(); submit();">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="textArea" class="form-label">Your Message</label>
                                <textarea class="form-control" id="textArea" rows="4" placeholder="How can we help you?" required></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Submit Message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 KainThereYah!. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
