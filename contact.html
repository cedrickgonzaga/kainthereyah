<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KainThereYah - Menu</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="../images/Kain.png" alt="" width="50" height="50" class="d-inline-block">
                <span>KainThereYah!</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-lg-3 mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html"><i
                                class="bi bi-house-fill"></i>
                            Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="menu.html"><i
                                class="bi bi-calculator"></i>
                            Menu Prices </a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contact.html"><i
                                class="bi bi-person-lines-fill"></i> Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="contact-section py-5">
        <div class="container">
            <!-- Contact Info Row -->
            <div class="row mb-5 text-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <div class="p-3 bg-white shadow-sm rounded">
                        <i class="bi bi-telephone-fill text-accent fs-4"></i>
                        <p class="mb-0 mt-2 fw-bold">+63 912 345 6789</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-3 bg-white shadow-sm rounded">
                        <i class="bi bi-envelope-at-fill text-accent fs-4"></i>
                        <p class="mb-0 mt-2 fw-bold">hello@kainthereyah.com</p>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- Form Column -->
                <div class="col-lg-6">
                    <div class="card shadow-sm border-0 p-4 h-100">
                        <h2 class="mb-4 text-accent">Send us a message</h2>
                        <form onsubmit="event.preventDefault(); submit();">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Juan Dela Cruz"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="textArea" class="form-label">Your Message</label>
                                <textarea class="form-control" id="textArea" rows="5" placeholder="How can we help you?"
                                    required></textarea>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Submit Message</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Map Column -->
                <div class="col-lg-6">
                    <div class="card shadow-sm border-0 h-100 overflow-hidden" style="min-height: 400px;">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3861.168537526749!2d120.977227075845!3d14.589571385900593!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397ca3d13d2a931%3A0x7ee60408422797e8!2sManila%20City%20Hall!5e0!3m2!1sen!2sph!4v1716000000000!5m2!1sen!2sph"
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 KainThereYah!. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script/script.js"></script>
</body>

</html>
